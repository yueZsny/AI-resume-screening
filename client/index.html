<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI智能简历筛选系统 - HR招聘管理平台</title>
  <meta name="description" content="专业的AI智能简历筛选系统，帮助HR高效筛选和管理候选人简历，支持多维度智能匹配，自动生成筛选报告。" />
  <meta name="keywords" content="AI简历筛选,HR招聘系统,智能筛选简历,招聘管理,简历管理系统" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://ai-resume-screening-jbpm.vercel.app/" />
    <!-- 预防主题闪烁：在 JS 执行前立即应用已保存的主题 -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("app-theme");
          if (!raw) return;
          var mode = JSON.parse(raw).state.mode;
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          if (mode === "system") {
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
              root.classList.add("dark");
            }
          } else {
            root.classList.add(mode);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
